<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees | Employee Management System</title>
    <link rel="stylesheet" href="employees.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>EMS</h2>

        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="employees.html" class="active">Employees</a></li>
            <li><a href="addEmployee.html">Add Employee</a></li>
            <li><a href="index.html">Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <header>
            <h1>Employee List</h1>
        </header>

        <div class="top-bar">

            <input
                type="text"
                id="searchInput"
                class="search-box"
                placeholder="🔍 Search Employee..."
                onkeyup="searchEmployee()">

            <a href="addEmployee.html" class="add-btn">
                + Add Employee
            </a>

        </div>

        <div class="table-container">

            <table class="employee-table">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Department</th>
                        <th>Designation</th>
                        <th>Salary</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="employeeTableBody">
                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="employees.js"></script>

</body>
</html>
